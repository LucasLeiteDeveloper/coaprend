<ion-header class="subpage-header">
  <ion-toolbar class="content-container">
    <ion-back-button slot="start" icon="chevron-back-outline" color="dark" text=""></ion-back-button>
    <ion-title>Configurações</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list-header>Básico</ion-list-header>
  <ion-list [inset]="true">
    <ion-item button (click)="editName()">Nome da sala</ion-item>
    <ion-item button (click)="editPhoto()">Foto da sala</ion-item>
    <ion-item button (click)="editDescription()">Descrição da sala</ion-item>
  </ion-list>

  <ion-list-header>Organização</ion-list-header>
  <ion-list [inset]="true">
    <ion-item button (click)="openTags()">Tags</ion-item>
  </ion-list>

  <ion-list-header>Permissões</ion-list-header>
  <ion-list [inset]="true">
    <ion-item button (click)="openUsers()">Usuários</ion-item>
  </ion-list>

  <ion-list-header>Convite</ion-list-header>
  <ion-list [inset]="true">
    <ion-item button (click)="showInviteCode()">Código de convite</ion-item>
  </ion-list>
</ion-content>
